<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="SDAtlas 分类论文列表。">
  <title>分类详情 · SDAtlas</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <script defer src="assets/js/data.js"></script>
  <script defer src="assets/js/ui.js"></script>
  <script defer src="assets/js/category.js"></script>
</head>
<body class="page-category">
  <header class="site-header" id="site-header"></header>
  <main id="main-content">
    <section class="detail-hero" id="category-hero"></section>
    <section class="section section--list page-shell">
      <div class="list-toolbar">
        <div>
          <p class="section-index">MATCHED PAPERS</p>
          <h2 id="list-title">相关论文</h2>
        </div>
        <label class="search-control">
          <span class="sr-only">在当前分类中搜索</span>
          <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"></circle><path d="m16 16 4 4"></path></svg>
          <input id="list-search" type="search" autocomplete="off" placeholder="在当前结果中搜索…">
        </label>
      </div>
      <p class="result-line" id="result-line" aria-live="polite"></p>
      <div class="paper-list" id="paper-list"></div>
    </section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
</body>
</html>
