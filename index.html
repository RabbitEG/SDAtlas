<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="按宏观类别与 D/Q/T/V/R/S/H 子问题浏览投机解码论文。">
  <title>SDAtlas · 投机解码论文索引</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <script defer src="assets/js/data.js"></script>
  <script defer src="assets/js/ui.js"></script>
  <script defer src="assets/js/index.js"></script>
</head>
<body class="page-home">
  <header class="site-header" id="site-header"></header>

  <main id="main-content">
    <section class="hero hero--home">
      <div class="hero-grid page-shell">
        <div class="hero-copy">
          <p class="eyebrow"><span>RESEARCH NAVIGATOR</span><span>2024—2026</span></p>
          <h1>投机解码论文索引</h1>
          <p class="hero-lede">围绕 Draft 生成、候选组织与 Verify 系统协同，收录 20 篇代表性论文。</p>
          <div class="hero-actions">
            <a class="button button-light" href="#major-categories">宏观类别</a>
            <a class="text-link text-link--light" href="explorer.html">进入组合筛选 <span aria-hidden="true">↗</span></a>
          </div>
        </div>
        <div class="hero-side">
          <div class="formula-card" aria-label="投机解码每 token 延迟近似公式">
            <span class="formula-label">OPTIMIZATION LENS</span>
            <div class="formula"><i>t</i><sub>token</sub><span>≈</span><span class="fraction"><b><i>T</i><sub>draft</sub> + <i>T</i><sub>verify</sub> + <i>T</i><sub>system</sub></b><b>τ</b></span></div>
          </div>
          <dl class="hero-stats" id="hero-stats" aria-label="数据集统计"></dl>
        </div>
      </div>
    </section>

    <section class="section page-shell" id="major-categories">
      <header class="section-heading section-heading--split">
        <div>
          <p class="section-index">01 / MACRO CATEGORIES</p>
          <h2>宏观类别</h2>
        </div>
        <div class="view-switch" role="group" aria-label="切换宏观类别视图">
          <button class="is-active" type="button" data-view="venn" aria-pressed="true"><span aria-hidden="true">◉</span> 韦恩图</button>
          <button type="button" data-view="table" aria-pressed="false"><span aria-hidden="true">▦</span> 表格</button>
        </div>
      </header>

      <div class="category-legend" id="category-legend"></div>
      <div class="view-panel" id="venn-view"></div>
      <div class="view-panel" id="table-view" hidden></div>
    </section>

    <section class="section section--tinted" id="research-tags">
      <div class="page-shell">
        <header class="section-heading section-heading--split">
          <div>
            <p class="section-index">02 / SUBPROBLEMS</p>
            <h2>子问题</h2>
          </div>
          <a class="text-link" href="explorer.html">组合子问题 <span aria-hidden="true">↗</span></a>
        </header>
        <div class="tag-grid" id="tag-grid"></div>
      </div>
    </section>

    <section class="section page-shell">
      <div class="explorer-callout">
        <div>
          <p class="section-index">03 / SET EXPLORER</p>
          <h2>跨分类研究组合</h2>
        </div>
        <a class="button button-primary button-large" href="explorer.html">打开组合筛选 <span aria-hidden="true">→</span></a>
        <div class="callout-orbit" aria-hidden="true"><i>A</i><i>T</i><i>H</i></div>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="site-footer"></footer>
</body>
</html>
