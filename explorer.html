<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="多选 A–E 子问题，以并集或交集筛选投机解码论文并查看论文关系。">
  <title>组合筛选 · SDAtlas</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/paper-details.css">
  <link rel="stylesheet" href="assets/css/citation-graph.css">
  <script defer src="assets/js/data.js"></script>
  <script defer src="assets/js/ui.js"></script>
  <script defer src="assets/js/citation-graph.js"></script>
  <script defer src="assets/js/explorer.js"></script>
</head>
<body class="page-explorer">
  <header class="site-header" id="site-header"></header>
  <main id="main-content">
    <section class="explorer-hero">
      <div class="page-shell explorer-hero__grid">
        <div>
          <p class="eyebrow eyebrow--dark"><span>SET EXPLORER</span><span>BOOLEAN FILTER</span></p>
          <h1>组合子问题，<br>找到研究交集。</h1>
        </div>
      </div>
    </section>

    <section class="explorer-layout page-shell">
      <aside class="filter-panel" aria-label="筛选条件">
        <div class="filter-panel__top">
          <div><span>FILTERS</span><strong>筛选条件</strong></div>
          <button id="clear-filters" class="plain-button" type="button">全部清除</button>
        </div>

        <fieldset class="mode-fieldset">
          <legend>集合关系</legend>
          <div class="mode-toggle">
            <label><input type="radio" name="mode" value="union" checked><span><strong>并集</strong><small>满足任意条件</small></span></label>
            <label><input type="radio" name="mode" value="intersection"><span><strong>交集</strong><small>满足全部条件</small></span></label>
          </div>
        </fieldset>

        <fieldset class="filter-fieldset">
          <legend><span>子问题</span></legend>
          <div id="subproblem-options" class="filter-options"></div>
        </fieldset>
      </aside>

      <section class="results-panel" aria-label="筛选结果">
        <div class="results-toolbar">
          <div>
            <p class="section-index">RESULT SET</p>
            <h2><span id="result-count">25</span> 篇论文</h2>
          </div>
          <div class="results-controls">
            <label class="search-control">
              <span class="sr-only">搜索结果</span>
              <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"></circle><path d="m16 16 4 4"></path></svg>
              <input id="result-search" type="search" autocomplete="off" placeholder="搜索标题、作者、单位或方法…">
            </label>
            <label class="sort-control"><span class="sr-only">排序方式</span>
              <select id="result-sort">
                <option value="index">按收录顺序</option>
                <option value="newest">时间从新到旧</option>
                <option value="name">按简称排序</option>
                <option value="citations">按被引用数排序</option>
              </select>
            </label>
          </div>
        </div>
        <div class="active-filters" id="active-filters" aria-live="polite"></div>

        <section class="results-citation-section" aria-labelledby="explorer-citation-heading">
          <h3 id="explorer-citation-heading">当前结果的论文关系</h3>
          <div id="citation-graph"></div>
        </section>

        <div class="paper-list paper-list--explorer" id="explorer-results"></div>
      </section>
    </section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
</body>
</html>
